services:
  backend:
    image: ${BACKEND_IMAGE:-DOCKERHUB_USER/voxia-backend}:${IMAGE_TAG:-latest}
    container_name: voxia-backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env.backend
        required: false
    volumes:
      - mlruns:/app/mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    image: ${FRONTEND_IMAGE:-DOCKERHUB_USER/voxia-frontend}:${IMAGE_TAG:-latest}
    container_name: voxia-frontend
    ports:
      - "3000:3000"
    env_file:
      - path: .env.frontend
        required: false
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mlruns:
