stages:
  - test
  - build
  - deploy

variables:
  BACKEND_IMAGE: $DOCKERHUB_USER/voxia-backend
  FRONTEND_IMAGE: $DOCKERHUB_USER/voxia-frontend
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  # Habilita BuildKit: builds en paralelo, mejor cache de capas
  DOCKER_BUILDKIT: "1"

# ─── TEST ──────────────────────────────────────────────────────────────────────

test:backend:
  stage: test
  image: python:3.11-slim
  cache:
    # Clave basada en el lockfile: solo se invalida si cambian las deps
    key:
      files:
        - backend/uv.lock
    paths:
      - .uv-cache/
    policy: pull-push   # descarga cache al inicio, sube al final
  variables:
    UV_CACHE_DIR: $CI_PROJECT_DIR/.uv-cache
  before_script:
    - pip install --no-cache-dir uv
    - cd backend
    - uv sync --no-install-project --group dev
  script:
    - uv run pytest tests/unit/ -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"

test:frontend:
  stage: test
  image: node:20-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
    policy: pull-push
  before_script:
    - cd frontend
    # npm ci borra node_modules si existe; usamos install para aprovechar cache
    - npm install --prefer-offline
  script:
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"

# ─── BUILD ─────────────────────────────────────────────────────────────────────

build:backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $DOCKERHUB_USER -p $DOCKERHUB_TOKEN
    # Descarga la imagen previa para usarla como cache de capas Docker
    - docker pull $BACKEND_IMAGE:latest || true
  script:
    - docker build
        --cache-from $BACKEND_IMAGE:latest
        -t $BACKEND_IMAGE:$IMAGE_TAG
        -t $BACKEND_IMAGE:latest
        ./backend
    - docker push $BACKEND_IMAGE:$IMAGE_TAG
    - docker push $BACKEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"

build:frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $DOCKERHUB_USER -p $DOCKERHUB_TOKEN
    - docker pull $FRONTEND_IMAGE:latest || true
  script:
    - docker build
        --cache-from $FRONTEND_IMAGE:latest
        --build-arg BACKEND_URL=http://backend:8000
        -t $FRONTEND_IMAGE:$IMAGE_TAG
        -t $FRONTEND_IMAGE:latest
        ./frontend
    - docker push $FRONTEND_IMAGE:$IMAGE_TAG
    - docker push $FRONTEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"

# ─── DEPLOY ────────────────────────────────────────────────────────────────────

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DO_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DO_USER@$DO_HOST "
        docker login -u $DOCKERHUB_USER -p $DOCKERHUB_TOKEN &&
        docker pull $BACKEND_IMAGE:latest &&
        docker pull $FRONTEND_IMAGE:latest &&
        cd /opt/voxia &&
        IMAGE_TAG=$IMAGE_TAG \
        BACKEND_IMAGE=$BACKEND_IMAGE \
        FRONTEND_IMAGE=$FRONTEND_IMAGE \
        docker compose -f docker-compose.prod.yml up -d --no-build &&
        docker image prune -f
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
  needs:
    - build:backend
    - build:frontend
  environment:
    name: production
    url: https://$DO_HOST
