services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voxia-backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - ./backend/mlruns:/app/mlruns
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: voxia-frontend
    ports:
      - "3000:3000"
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
