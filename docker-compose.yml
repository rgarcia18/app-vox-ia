# Docker Compose - VoxIA Application
# Development Configuration with Separated Services
# Enhanced for better organization and error handling

services:
  # ============================================
  # Backend Service - FastAPI + Python ML
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - PYTHON_ENV=development
    container_name: voxia-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./test.db}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - FRONTEND_URL=http://frontend:3000
      - REDIS_URL=redis://redis:6379
      - GRPC_HOST=localhost
      - GRPC_PORT=50051
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - voxia-network
    depends_on:
      - redis
    labels:
      service: backend
      version: "1.0.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: voxia-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    user: root
    command: npm run dev
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - voxia-network
    depends_on:
      - backend
    labels:
      service: frontend
      version: "1.0.0"

  # ============================================
  # Redis Cache - Session & Data Storage
  # ============================================
  redis:
    image: redis:7.2-alpine
    container_name: voxia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - voxia-network
    labels:
      service: cache
      version: "7.2"
    command: redis-server --appendonly yes --appendfsync everysec

# ============================================
# Volumes for Data Persistence
# ============================================
volumes:
  backend_cache:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks for Service Communication
# ============================================
networks:
  voxia-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
